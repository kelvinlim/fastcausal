site_name: fastcausal
site_description: Fast, easy-to-use causal discovery analysis tools — no Java required
site_url: https://kelvinlim.github.io/fastcausal/
repo_url: https://github.com/kelvinlim/fastcausal
repo_name: kelvinlim/fastcausal

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source
            show_root_heading: true
            show_if_no_docstring: false
  - mkdocs-jupyter:
      execute: false

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - Algorithms: algorithms.md
  - API Reference: api.md
  - Tutorials:
    - Quick Start: tutorials/quickstart.ipynb
    - EMA Analysis: tutorials/ema_analysis.ipynb
  - Migration:
    - From fastcda: migration_from_fastcda.md
    - From cda_tools2: migration_from_cda_tools2.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
